<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful – OXZ Markets</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f7fc;color:#1a202c;min-height:100vh;display:flex;flex-direction:column;}
nav{background:#fff;padding:14px 50px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(26,90,220,0.08);}
.lbox{background:#1a5adc;color:#fff;font-weight:800;font-size:20px;padding:5px 13px;border-radius:6px;letter-spacing:1px;text-decoration:none;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{background:#fff;border-radius:20px;padding:50px 40px;max-width:500px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(26,90,220,0.1);border:1px solid #dde3f0;animation:slideUp 0.5s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* Success icon */
.sico{width:90px;height:90px;border-radius:50%;background:#e6faf4;border:3px solid #00b87a;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:pop 0.5s cubic-bezier(.175,.885,.32,1.275) 0.2s both;}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.sico svg{width:40px;height:40px;stroke:#00b87a;stroke-width:2.5;fill:none;}

/* Cancelled icon */
.cico{width:90px;height:90px;border-radius:50%;background:#fff5f5;border:3px solid #e53e3e;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:pop 0.5s cubic-bezier(.175,.885,.32,1.275) 0.2s both;}
.cico svg{width:40px;height:40px;stroke:#e53e3e;stroke-width:2.5;fill:none;}

.badge{display:inline-block;background:#e6faf4;color:#00b87a;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:100px;padding:5px 14px;margin-bottom:16px;}
.badge.cancel{background:#fff5f5;color:#e53e3e;}

h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:10px;}
.amt{font-size:42px;font-weight:800;color:#1a5adc;margin:12px 0;}
.desc{color:#6b7a99;font-size:14px;line-height:1.7;max-width:360px;margin:0 auto 28px;}

.infobox{background:#f4f7fc;border-radius:12px;padding:16px 20px;margin-bottom:28px;text-align:left;}
.irow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #dde3f0;font-size:13px;}
.irow:last-child{border-bottom:none;}
.irow span:first-child{color:#6b7a99;}
.irow span:last-child{font-weight:700;color:#1a202c;word-break:break-all;text-align:right;max-width:60%;}

.note{background:#e8f0fd;border-radius:10px;padding:14px 18px;font-size:13px;color:#1a5adc;font-weight:500;margin-bottom:24px;text-align:left;line-height:1.6;}
.note.cancel{background:#fff5f5;color:#e53e3e;}

.btnrow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.bblu{display:inline-flex;align-items:center;gap:8px;background:#1a5adc;color:#fff;border:none;border-radius:10px;padding:14px 28px;font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.25s;text-decoration:none;box-shadow:0 6px 20px rgba(26,90,220,0.28);}
.bblu:hover{background:#0f3d9e;transform:translateY(-2px);}
.bgho{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#1a5adc;border:1.5px solid #dde3f0;border-radius:10px;padding:14px 24px;font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all 0.25s;text-decoration:none;}
.bgho:hover{border-color:#1a5adc;background:#e8f0fd;}

footer{background:#0d1b3e;color:rgba(255,255,255,0.5);text-align:center;padding:18px;font-size:11px;}
footer a{color:rgba(255,255,255,0.5);text-decoration:none;}
</style>
</head>
<body>

<nav>
  <a class="lbox" href="/">OXZ</a>
  <div style="font-size:12px;color:#6b7a99;">Secure Payment · 256-bit SSL</div>
</nav>

<div class="main">
  <div class="card" id="mainCard">
    <!-- Content injected by JS -->
  </div>
</div>

<footer>© 2026 OXZ Markets · <a href="https://oxzmarket.com/">oxzmarket.com</a> · All rights reserved · Trading involves risk.</footer>

<script>
// Read URL params
const params = new URLSearchParams(window.location.search);
const status = params.get('status'); // 'success' or 'cancel'
const orderId = params.get('order_id') || params.get('orderId') || '—';
const email = params.get('email') || '—';
const amount = params.get('amount'); // in cents

// Format amount
const displayAmt = amount ? '$' + (parseInt(amount) / 100).toFixed(2) : '';

const card = document.getElementById('mainCard');

if (status === 'cancel') {
  // CANCELLED
  card.innerHTML = `
    <div class="cico">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="badge cancel">Payment Cancelled</div>
    <h1>Payment Cancelled</h1>
    <p class="desc">Your payment was not completed. No charges have been made to your account.</p>
    <div class="note cancel">💡 If you faced any issue, please try again or contact our support team at <a href="https://oxzmarket.com/" style="color:#e53e3e;font-weight:700">oxzmarket.com</a></div>
    <div class="btnrow">
      <a class="bblu" href="/">💳 Try Again</a>
      <a class="bgho" href="https://oxzmarket.com/" target="_blank">Visit OXZ Markets</a>
    </div>
  `;
} else {
  // SUCCESS (default)
  const now = new Date();
  const timeStr = now.toLocaleString('en-US', {dateStyle:'medium', timeStyle:'short'});

  card.innerHTML = `
    <div class="sico">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="badge">Payment Successful</div>
    <h1>Deposit Confirmed! 🎉</h1>
    ${displayAmt ? `<div class="amt">${displayAmt}</div>` : ''}
    <p class="desc">Your deposit has been received successfully. Your OXZ Markets account will be credited shortly.</p>

    ${(orderId !== '—' || email !== '—') ? `
    <div class="infobox">
      ${orderId !== '—' ? `<div class="irow"><span>Order ID</span><span>${orderId}</span></div>` : ''}
      ${email !== '—' ? `<div class="irow"><span>Email</span><span>${email}</span></div>` : ''}
      <div class="irow"><span>Status</span><span style="color:#00b87a">✓ Confirmed</span></div>
      <div class="irow"><span>Time</span><span>${timeStr}</span></div>
    </div>` : `
    <div class="infobox">
      <div class="irow"><span>Status</span><span style="color:#00b87a">✓ Confirmed</span></div>
      <div class="irow"><span>Time</span><span>${timeStr}</span></div>
    </div>`}

    <div class="note">📧 You'll receive a confirmation email shortly. It may take a few minutes for your account balance to update.</div>
    <div class="btnrow">
      <a class="bblu" href="/">🏠 Back to Home</a>
      <a class="bgho" href="https://oxzmarket.com/" target="_blank">Go to OXZ Markets</a>
    </div>
  `;
}
</script>
</body>
</html>
