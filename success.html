<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment Successful – OXZ Markets</title>
<style>
  body{font-family:sans-serif;background:#f4f7fc;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:16px;}
  .spinner{width:44px;height:44px;border:4px solid #e8f0fd;border-top-color:#1a5adc;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:14px;color:#6b7a99;}
</style>
</head>
<body>
  <div class="spinner"></div>
  <p>Payment confirmed! Redirecting...</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId') || '';
    const extra = orderId ? '&orderId=' + encodeURIComponent(orderId) : '';
    window.location.replace('/?payment=success' + extra);
  </script>
</body>
</html>
